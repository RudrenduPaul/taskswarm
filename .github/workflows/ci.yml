name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: |
          npx eslint .
          npx prettier --check .

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json

      - name: Test (with coverage)
        run: npx vitest run --coverage

      - name: Security audit (no high/critical vulnerabilities)
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Smoke test built CLI
        run: |
          node dist/cli.js --help
          node dist/cli.js --version
